name: Build Test

on:
  pull_request:
    paths:
      - 'packages/aur/**'
      - 'packages/personal/**'

jobs:
  arch-test:
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Sync Package Manager
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm namcap pacman-contrib sudo git

      - name: Provision Build User
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          chown -R builder:builder .

      - name: Execute Build Test
        run: |
          for dir in $(find packages -mindepth 2 -maxdepth 2 -type d); do
            if [ -f "$dir/PKGBUILD" ]; then
              echo "Processing: $dir"
              namcap "$dir/PKGBUILD"
              cd "$dir"
              sudo -u builder makepkg --syncdeps --nobuild --noconfirm --asdeps
              cd - > /dev/null
            fi
          done
